version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tobacco-grading-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - ./data:/app/data
    networks:
      - tobacco-network

  nginx:
    image: nginx:alpine
    container_name: tobacco-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./dist:/usr/share/nginx/html
    depends_on:
      - app
    networks:
      - tobacco-network

networks:
  tobacco-network:
    driver: bridge

volumes:
  tobacco-data:
